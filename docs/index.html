<!doctype html>
<html>
  <head>
    <style>
      :root {
        --color-heading-before: #9cdcfe;
        --color-heading: #9cdcfe;

        --color-bg: #181a1f;
        --color: #e6e6e6;

        --color-code: #e6e6e6;
        --color-code-bg: #111317;

        --color-link: #58a6ff;
        --color-link-hover: #79c0ff;

        --color-li-before: #ffcb6b;
      }

      * {
        font-family: monospace;
        font-size: 1em;
        border: 0;
        margin: 0;
        padding: 0;
        list-style: none;
        font-weight: normal;
      }

      body {
        width: 75ex;
        margin: 1em auto;

        color: var(--color);
        background: var(--color-bg);
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol,
      p,
      pre {
        margin-bottom: 0.5em;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--color-heading);

        code {
          background: var(--color-bg);
        }

        &::before {
          color: var(--color-heading-before);
        }
      }

      h1 {
        &::before {
          content: "# ";
        }

        margin-top: 2.5rem;
      }

      h2 {
        &::before {
          content: "## ";
        }

        margin-top: 2.1rem;
      }

      h3 {
        &::before {
          content: "### ";
        }

        margin-top: 1.7rem;
      }

      h4 {
        &::before {
          content: "#### ";
        }

        margin-top: 1.3rem;
      }

      h5 {
        &::before {
          content: "##### ";
        }

        margin-top: 0.9rem;
      }

      h6 {
        &::before {
          content: "###### ";
        }

        margin-top: 0.5rem;
      }

      strong,
      b {
        font-weight: bold;
      }

      em,
      i {
        font-style: italic;
      }

      strong::before,
      strong::after,
      b::before,
      b::after {
        content: "**";
      }

      em::before,
      em::after,
      i::before,
      i::after {
        content: "_";
      }

      pre,
      code {
        background: var(--color-code-bg);
        color: var(--color-code);
      }

      pre {
        overflow: auto;

        &::before,
        &::after {
          content: "```";
          display: block;
        }

        code {
          &::before,
          &::after {
            content: "";
          }
        }
      }

      code {
        &::before,
        &::after {
          content: "`";
          background: var(--color-bg);
        }
      }

      ol li {
        margin-left: 4ex;
        list-style: decimal outside;
      }
      ul li {
        margin-left: 3ex;

        &::before {
          content: "* ";
          display: block;
          margin-left: -2.5ex;
          margin-top: 0.5ex;
          color: var(--color-li-before);
          float: left;
        }
      }

      a {
        text-decoration: none;
        color: var(--color-link);

        &:hover {
          color: var(--color-link-hover);
        }

        &::before {
          content: "[";
        }

        &::after {
          content: "]";
        }
      }

      @media print {
        body {
          width: auto;
          font-size: 10pt;
        }
      }
    </style>
  </head>
  <body><h1>reve</h1>
<p>I write JS libraries and benchmarks.</p>
<h2>libs</h2>
<ul>
<li>mapl <a href="//github.com/mapljs">github.com/mapljs</a></li>
<li>re-utils <a href="//github.com/re-utils">github.com/re-utils</a></li>
<li>nuws <a href="//github.com/aquapi/nuws">github.com/aquapi/nuws</a></li>
<li>rou3 <a href="//github.com/h3js/rou3">github.com/h3js/rou3</a></li>
</ul>
</body>
</html>
